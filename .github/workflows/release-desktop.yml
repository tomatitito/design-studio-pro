name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - platform_name: macos
            runner: macos-latest
            target: ""
          - platform_name: linux
            runner: ubuntu-22.04
            target: ""
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app and upload release assets (${{ matrix.platform_name }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Design Studio Pro ${{ github.ref_name }}
          releaseBody: Automated cross-platform release artifacts (Windows, macOS, Linux).
          releaseDraft: false
          prerelease: false
          tauriScript: pnpm tauri
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
