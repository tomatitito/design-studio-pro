name: Version Bump To Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - package.json

permissions:
  contents: write

jobs:
  sync-and-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.value }}
      created_tag: ${{ steps.create-tag.outputs.created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -e "const fs=require('node:fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));console.log(pkg.version)")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Synchronize version across files
        run: node scripts/sync-version.mjs

      - name: Commit synced version files (if needed)
        run: |
          if [ -n "$(git status --porcelain -- src-tauri/tauri.conf.json src-tauri/Cargo.toml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore(release): sync version files to v${{ steps.version.outputs.value }}"
            git push
          else
            echo "Version files already synchronized."
          fi

      - name: Create and push tag (if missing)
        id: create-tag
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  release-desktop:
    needs: sync-and-tag
    if: needs.sync-and-tag.outputs.created_tag == 'true'
    uses: ./.github/workflows/release-desktop.yml
    permissions:
      contents: write
    with:
      release_tag: ${{ needs.sync-and-tag.outputs.tag }}
    secrets: inherit

  release-cli:
    needs: sync-and-tag
    if: needs.sync-and-tag.outputs.created_tag == 'true'
    uses: ./.github/workflows/release-cli.yml
    permissions:
      contents: write
    with:
      release_tag: ${{ needs.sync-and-tag.outputs.tag }}
    secrets: inherit
